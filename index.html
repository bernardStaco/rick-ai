<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Suno v5 Tag Generator</title>
<style>
:root {
  --bg: #0d0d12;
  --surface: #16161f;
  --surface2: #1e1e2a;
  --surface3: #252535;
  --border: #2a2a3d;
  --text: #e2e2f0;
  --text-dim: #7878a0;
  --text-muted: #4a4a6a;
  --l1: #8b5cf6;
  --l2: #3b82f6;
  --l3: #14b8a6;
  --l4: #22c55e;
  --l5: #f97316;
  --l6: #eab308;
  --conflict: #ef4444;
  --warn: #f59e0b;
  --pink: #ec4899;
  --radius: 10px;
  --radius-sm: 6px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: system-ui, -apple-system, sans-serif; font-size: 18px; line-height: 1.6; min-height: 100vh; }

/* ── LAYOUT ── */
.app-header { background: linear-gradient(135deg, #1a1030 0%, #0d1525 100%); border-bottom: 1px solid var(--border); padding: 10px 20px; position: sticky; top: 0; z-index: 100; }
.header-inner { max-width: 1400px; margin: 0 auto; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.header-logo { font-size: 24px; flex-shrink: 0; }
.header-text { min-width: 0; }
.header-text h1 { font-size: 18px; font-weight: 700; background: linear-gradient(90deg, var(--l1), var(--l2), var(--l3)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; white-space: nowrap; }
.header-text p { font-size: 13px; color: var(--text-dim); margin-top: 1px; display: none; }
@media (min-width: 700px) { .header-text p { display: block; } }
.header-actions { margin-left: auto; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
/* ── THEME SWATCHES ── */
.theme-row { display: flex; align-items: center; gap: 5px; }
.theme-row-label { font-size: 13px; color: var(--text-muted); margin-right: 4px; }
.swatch { width: 18px; height: 18px; border-radius: 50%; border: 2px solid transparent; cursor: pointer; transition: all .15s; flex-shrink: 0; padding: 0; outline: none; }
.swatch:hover { transform: scale(1.2); }
.swatch.active { border-color: var(--text); transform: scale(1.2); }
/* ── EXPORT DROPDOWN ── */
.export-wrap { position: relative; }
.export-dd { position: absolute; top: calc(100% + 6px); right: 0; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); box-shadow: 0 8px 24px rgba(0,0,0,.5); min-width: 160px; display: none; z-index: 200; overflow: hidden; }
.export-dd.open { display: block; }
.export-dd button { display: flex; align-items: center; gap: 8px; width: 100%; padding: 9px 14px; background: none; border: none; color: var(--text); font-size: 13px; cursor: pointer; text-align: left; font-family: inherit; transition: background .1s; }
.export-dd button:hover { background: var(--surface2); }
.export-dd .dd-divider { height: 1px; background: var(--border); margin: 2px 0; }

.main { max-width: 1400px; margin: 0 auto; padding: 16px 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; align-items: start; }
#preview-col { position: sticky; top: 60px; max-height: calc(100vh - 72px); overflow-y: auto; scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
#preview-col::-webkit-scrollbar { width: 4px; }
#preview-col::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
@media (max-width: 860px) { .main { grid-template-columns: 1fr; padding: 12px; gap: 12px; } #preview-col { position: static; max-height: none; overflow-y: visible; } }
@media (max-width: 480px) { .main { padding: 8px; gap: 8px; } .app-header { padding: 8px 12px; } }

/* ── CARDS ── */
.card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; margin-bottom: 14px; }
.card-inner { padding: 16px; }

/* ── LAYER HEADERS ── */
.layer-hdr { display: flex; align-items: center; gap: 10px; padding: 12px 16px; border-bottom: 1px solid var(--border); background: var(--surface2); cursor: pointer; user-select: none; transition: background .12s; }
.layer-hdr:hover { background: var(--surface3); }
.layer-hdr.no-acc { cursor: default; }
.layer-hdr.no-acc:hover { background: var(--surface2); }
.layer-badge { width: 30px; height: 30px; border-radius: 6px; background: var(--layer-color, var(--l1)); display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; color: #fff; flex-shrink: 0; }
.layer-title { font-size: 14px; font-weight: 700; color: var(--text); }
.layer-hint { font-size: 13px; color: var(--text-dim); margin-left: auto; text-align: right; max-width: 200px; }
.layer-summary { margin-left: auto; margin-right: 6px; font-size: 13px; color: var(--text-dim); font-family: monospace; max-width: 220px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; background: var(--surface3); padding: 2px 8px; border-radius: 10px; border: 1px solid var(--border); }
.acc-chevron { flex-shrink: 0; color: var(--text-muted); font-size: 13px; transition: transform .2s; line-height: 1; }
.acc-chevron.open { transform: rotate(180deg); }
.acc-hidden { display: none; }
/* ── SONG STRUCTURE MAP ── */
.struct-map { display: flex; flex-wrap: wrap; align-items: center; gap: 4px; padding: 12px 14px; }
.struct-map-block { display: flex; flex-direction: column; align-items: center; gap: 2px; padding: 7px 10px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface2); min-width: 66px; cursor: pointer; transition: all .15s; }
.struct-map-block:hover { border-color: var(--l2); background: var(--surface3); }
.smb-tag { font-size: 13px; font-weight: 700; font-family: monospace; color: var(--l2); }
.smb-dtag { font-size: 13px; color: var(--pink); font-family: monospace; min-height: 13px; }
.smb-text { font-size: 13px; color: var(--text-muted); max-width: 80px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.struct-arrow { color: var(--text-muted); font-size: 13px; }
.struct-map-empty { padding: 24px 16px; text-align: center; color: var(--text-muted); font-size: 13px; }

/* ── BUTTONS ── */
.btn { display: inline-flex; align-items: center; gap: 6px; padding: 7px 14px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: var(--surface2); color: var(--text); font-size: 13px; cursor: pointer; transition: all .15s; font-family: inherit; }
.btn:hover { background: var(--surface3); border-color: var(--text-dim); }
.btn-primary { background: var(--l1); border-color: var(--l1); color: #fff; font-weight: 600; padding: 8px 16px; width: 100%; justify-content: center; }
.btn-primary:hover { opacity: .9; }
.btn-copy { background: var(--surface3); font-size: 13px; padding: 4px 10px; }
.btn-copy.copied { background: var(--l4); border-color: var(--l4); color: #fff; }
.btn-ghost { background: transparent; border-color: transparent; color: var(--text-dim); }
.btn-ghost:hover { color: var(--text); background: var(--surface2); border-color: var(--border); }
.btn-danger-ghost { color: var(--conflict); }
.btn-danger-ghost:hover { background: rgba(239,68,68,.1); border-color: var(--conflict); }
.btn-icon { width: 22px; height: 22px; padding: 0; border-radius: 4px; border: none; background: transparent; color: var(--text-dim); cursor: pointer; display: inline-flex; align-items: center; justify-content: center; font-size: 13px; transition: all .15s; }
.btn-icon:hover { background: var(--surface3); color: var(--text); }
.btn-icon.del:hover { color: var(--conflict); background: rgba(239,68,68,.1); }
.btn-add { display: inline-flex; align-items: center; gap: 5px; padding: 5px 10px; border-radius: var(--radius-sm); border: 1px dashed var(--border); background: transparent; color: var(--text-dim); font-size: 13px; cursor: pointer; margin-top: 8px; transition: all .15s; }
.btn-add:hover { border-color: var(--text-dim); color: var(--text); }
.btn-tab { padding: 5px 12px; border-radius: 20px; border: 1px solid var(--border); background: transparent; color: var(--text-dim); font-size: 13px; cursor: pointer; transition: all .15s; }
.btn-tab.active { background: var(--l1); border-color: var(--l1); color: #fff; }

/* ── GENRE PICKER ── */
.genre-group-label { font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: var(--text-muted); margin-bottom: 8px; }
.genre-group { margin-bottom: 16px; }
.genre-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 8px; }
.genre-card { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 10px 8px; cursor: pointer; transition: all .15s; text-align: center; display: flex; flex-direction: column; align-items: center; gap: 5px; }
.genre-card:hover { border-color: var(--l1); background: var(--surface3); }
.genre-card.active { border-color: var(--l1); background: rgba(139,92,246,.12); box-shadow: 0 0 0 1px var(--l1); }
.genre-icon { font-size: 22px; }
.genre-name { font-size: 13px; font-weight: 600; color: var(--text); }
/* ── FAVORITES ── */
.genre-card-wrap { position: relative; display: flex; flex-direction: column; }
.fav-btn { position: absolute; top: 3px; right: 3px; z-index: 2; background: none; border: none; cursor: pointer; font-size: 14px; padding: 2px 3px; line-height: 1; opacity: .35; transition: opacity .15s, transform .15s; }
.fav-btn:hover { opacity: 1; transform: scale(1.25); }
.fav-btn.active { opacity: 1; color: var(--l6); }
.fav-group-label { font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: var(--l6); margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
.fav-empty { font-size: 13px; color: var(--text-muted); font-style: italic; padding: 6px 0 2px; }
/* ── VOCALIST BUILDER ── */
.vo-section-label { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: .07em; color: var(--text-muted); margin: 12px 0 5px; }
.vo-section-label .vo-hint { font-size: 11px; font-weight: 400; text-transform: none; letter-spacing: 0; color: var(--text-muted); opacity: .7; }
.vo-preview { margin: 10px 0 4px; font-size: 13px; color: var(--text-dim); background: var(--surface2); border-radius: var(--radius-sm); padding: 6px 10px; }
.vo-preview code { color: var(--pink); font-family: monospace; }
.vo-actions { display: flex; gap: 6px; margin-top: 10px; align-items: center; flex-wrap: wrap; }
.vo-active-banner { display: flex; align-items: center; justify-content: space-between; gap: 8px; background: rgba(236,72,153,.1); border: 1px solid rgba(236,72,153,.3); border-radius: var(--radius-sm); padding: 7px 10px; margin-bottom: 12px; font-size: 13px; color: var(--text-dim); flex-wrap: wrap; }
.vo-lib-header { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: .07em; color: var(--text-muted); margin-bottom: 8px; }
.vo-lib-list { display: flex; flex-direction: column; gap: 6px; }
.vo-lib-item { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 8px 10px; display: flex; flex-wrap: wrap; align-items: center; gap: 6px; }
.vo-lib-item.active { border-color: var(--pink); background: rgba(236,72,153,.08); }
.vo-lib-name { font-size: 13px; font-weight: 700; color: var(--text); min-width: 80px; }
.vo-lib-desc { font-size: 12px; color: var(--text-muted); flex: 1; min-width: 120px; font-family: monospace; }
.vo-lib-actions { display: flex; gap: 4px; margin-left: auto; flex-shrink: 0; }
.btn-xs { padding: 3px 8px; font-size: 11px; border-radius: 4px; }
.artist-ref-none { font-size: 13px; color: var(--text-muted); font-style: italic; padding: 4px 0; }
.genre-desc { font-size: 13px; color: var(--text-dim); line-height: 1.3; }
/* ── GENRE SELECTED STATE ── */
.genre-sel-row { display: flex; align-items: center; gap: 14px; padding: 14px 16px; }
.genre-sel-icon { font-size: 36px; line-height: 1; flex-shrink: 0; }
.genre-sel-info { flex: 1; min-width: 0; }
.genre-sel-name { font-size: 17px; font-weight: 700; color: var(--text); }
.genre-sel-meta { font-size: 13px; color: var(--text-dim); margin-top: 2px; }
.genre-sel-desc { font-size: 13px; color: var(--text-muted); margin-top: 3px; font-style: italic; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.check-badge { width: 24px; height: 24px; border-radius: 50%; background: var(--l4); display: flex; align-items: center; justify-content: center; font-size: 13px; color: #fff; flex-shrink: 0; margin-right: 4px; }
.subgenre-card-inner { padding: 14px 16px; }
.subgenre-label { font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: var(--text-dim); margin-bottom: 10px; }
.subgenre-selected-badge { display: inline-block; padding: 3px 10px; border-radius: 20px; background: rgba(139,92,246,.2); border: 1px solid var(--l1); color: var(--l1); font-size: 13px; font-weight: 600; margin-bottom: 10px; }

/* ── CHIPS ── */
.chip-group { display: flex; flex-wrap: wrap; gap: 6px; }
.chip { padding: 5px 11px; border-radius: 20px; border: 1px solid var(--border); background: var(--surface2); color: var(--text-dim); font-size: 13px; cursor: pointer; transition: all .15s; font-family: inherit; }
.chip:hover { border-color: var(--text-dim); color: var(--text); }
.chip.active { background: rgba(139,92,246,.2); border-color: var(--l1); color: var(--l1); font-weight: 600; }
.chip.active-l2 { background: rgba(59,130,246,.2); border-color: var(--l2); color: var(--l2); }
.chip.active-l3 { background: rgba(20,184,166,.2); border-color: var(--l3); color: var(--l3); }
.chip.active-l4 { background: rgba(34,197,94,.2); border-color: var(--l4); color: var(--l4); }
.chip.active-l5 { background: rgba(249,115,22,.2); border-color: var(--l5); color: var(--l5); }
.chip.active-l6 { background: rgba(234,179,8,.2); border-color: var(--l6); color: var(--l6); }
.chip.conflict { border-color: var(--conflict); color: var(--conflict); opacity: .7; }
.chip.warn { border-color: var(--warn); color: var(--warn); }
.chip.chip-sm { font-size: 13px; padding: 3px 9px; }
.chip.chip-xs { font-size: 13px; padding: 2px 7px; }
.chip.chip-exclude { color: var(--conflict); border-color: rgba(239,68,68,.3); }
.chip.chip-exclude:hover { background: rgba(239,68,68,.1); }
.chip.chip-exclude.active { background: rgba(239,68,68,.2); border-color: var(--conflict); }
.chip.chip-struct { color: var(--l2); border-color: rgba(59,130,246,.3); }
.chip.chip-struct:hover { background: rgba(59,130,246,.1); }
.chip.chip-delivery { color: var(--pink); border-color: rgba(236,72,153,.3); }
.chip.chip-delivery:hover { background: rgba(236,72,153,.1); }
.chip.chip-delivery.active { background: rgba(236,72,153,.2); border-color: var(--pink); color: var(--pink); }

/* ── MOOD SECTION ── */
.mood-group { margin-bottom: 12px; }
.mood-primary-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
.mood-primary-btn { padding: 6px 14px; border-radius: 20px; border: 2px solid var(--border); background: var(--surface2); color: var(--text); font-size: 13px; font-weight: 600; cursor: pointer; transition: all .15s; }
.mood-primary-btn:hover { border-color: var(--l2); }
.mood-primary-btn.active { background: rgba(59,130,246,.2); border-color: var(--l2); color: var(--l2); }
.mood-primary-btn.warn { border-color: var(--warn); }
.mood-modifiers { display: flex; flex-wrap: wrap; gap: 5px; padding-left: 12px; }

/* ── TEMPO ── */
.tempo-range-bar { display: flex; justify-content: space-between; font-size: 13px; color: var(--text-dim); margin-bottom: 6px; }
.tempo-range-bar .range-label-warn { color: var(--conflict); font-weight: 700; }
.tempo-slider { width: 100%; accent-color: var(--l3); height: 6px; border-radius: 3px; cursor: pointer; transition: accent-color .2s; }
.tempo-slider.bpm-warn { accent-color: var(--conflict); }
.tempo-bpm-display { text-align: center; margin-top: 8px; display: flex; align-items: baseline; justify-content: center; gap: 4px; }
.tempo-bpm-num { font-size: 36px; font-weight: 700; color: var(--l3); transition: color .2s; }
.tempo-bpm-num.bpm-warn { color: var(--conflict); }
.tempo-bpm-unit { font-size: 13px; color: var(--text-dim); }
.bpm-warn-msg { display: none; text-align: center; font-size: 13px; color: var(--conflict); margin-top: 4px; padding: 4px 10px; background: rgba(239,68,68,.1); border-radius: 4px; border: 1px solid rgba(239,68,68,.3); }
.bpm-warn-msg.visible { display: block; }
.tempo-presets { display: flex; align-items: center; gap: 6px; margin-top: 10px; flex-wrap: wrap; }
.tempo-preset-label { font-size: 13px; color: var(--text-dim); }

/* ── INSTRUMENTS ── */
.inst-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
.inst-item { display: flex; align-items: center; gap: 8px; padding: 7px 10px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: var(--surface2); cursor: pointer; transition: all .15s; }
.inst-item:hover { border-color: var(--l4); }
.inst-item.selected { border-color: var(--l4); background: rgba(34,197,94,.1); }
.inst-item input[type=checkbox] { accent-color: var(--l4); width: 14px; height: 14px; flex-shrink: 0; }
.inst-order { width: 18px; height: 18px; border-radius: 50%; background: var(--surface3); display: flex; align-items: center; justify-content: center; font-size: 11px; color: var(--text-dim); flex-shrink: 0; }
.inst-item.selected .inst-order { background: var(--l4); color: #fff; }
.inst-name { font-size: 13px; color: var(--text); flex: 1; }

/* ── QUALITY/VOCAL TAG ITEMS ── */
.tag-item { display: flex; align-items: flex-start; gap: 10px; padding: 10px 12px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: var(--surface2); cursor: pointer; transition: all .15s; margin-bottom: 6px; }
.tag-item:hover { border-color: var(--l6); }
.tag-item.selected-quality { border-color: var(--l6); background: rgba(234,179,8,.1); }
.tag-item.selected-vocal { border-color: var(--pink); background: rgba(236,72,153,.1); }
.tag-item.conflict-item { border-color: rgba(239,68,68,.4); opacity: .6; }
.tag-item input[type=checkbox] { margin-top: 2px; flex-shrink: 0; accent-color: var(--l6); width: 14px; height: 14px; }
.tag-item.selected-vocal input[type=checkbox] { accent-color: var(--pink); }
.tag-label { font-size: 13px; font-weight: 700; font-family: monospace; color: var(--text); }
.tag-desc { font-size: 13px; color: var(--text-dim); margin-top: 2px; line-height: 1.4; }
.conflict-badge { display: inline-block; padding: 1px 6px; border-radius: 10px; background: rgba(239,68,68,.2); border: 1px solid var(--conflict); color: var(--conflict); font-size: 13px; margin-top: 3px; }

/* ── CONFLICT BANNER ── */
.conflict-banner { margin: 0 16px 12px; padding: 8px 12px; border-radius: var(--radius-sm); background: rgba(239,68,68,.1); border: 1px solid rgba(239,68,68,.4); color: var(--conflict); font-size: 13px; }

/* ── INPUTS ── */
.text-input { width: 100%; padding: 7px 10px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: var(--surface3); color: var(--text); font-size: 13px; font-family: inherit; transition: border-color .15s; outline: none; }
.text-input:focus { border-color: var(--l1); }
.textarea { width: 100%; padding: 8px 10px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: var(--surface3); color: var(--text); font-size: 13px; font-family: inherit; resize: vertical; outline: none; transition: border-color .15s; }
.textarea:focus { border-color: var(--l1); }
.custom-row { display: flex; align-items: center; gap: 6px; margin-top: 6px; }
.custom-prefix { font-size: 13px; color: var(--conflict); font-family: monospace; white-space: nowrap; }
.selected-summary { margin-top: 10px; padding: 8px 10px; border-radius: var(--radius-sm); background: var(--surface3); font-size: 13px; color: var(--text-dim); }
.selected-tag { display: inline-block; padding: 1px 7px; border-radius: 10px; background: var(--surface); border: 1px solid var(--border); color: var(--text); margin: 2px; font-size: 13px; }

/* ── SECTION HEADER ── */
.sec-hdr { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; border-bottom: 1px solid var(--border); }
.sec-hdr h3 { font-size: 13px; font-weight: 700; }
.sec-hint { font-size: 13px; color: var(--text-dim); }

/* ── PREVIEW SIDE ── */
.preview-empty { padding: 48px 20px; text-align: center; color: var(--text-dim); }
.preview-empty-icon { font-size: 48px; margin-bottom: 12px; }
.preview-empty p { font-size: 13px; }
.preview-hdr { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px; border-bottom: 1px solid var(--border); background: var(--surface2); }
.preview-hdr h3 { font-size: 13px; font-weight: 700; color: var(--text-dim); text-transform: uppercase; letter-spacing: .06em; }
.annotated-wrap { padding: 14px; display: flex; flex-wrap: wrap; gap: 6px; align-items: flex-start; }
.ann-part { display: flex; flex-direction: column; padding: 4px 8px; border-radius: var(--radius-sm); border: 1px solid var(--part-color, var(--border)); background: color-mix(in srgb, var(--part-color, var(--border)) 12%, transparent); max-width: 100%; }
.ann-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: var(--part-color, var(--text-dim)); }
.ann-content { font-size: 13px; color: var(--text); word-break: break-word; }
.ann-comma { color: var(--text-muted); padding: 4px 0; align-self: center; font-size: 13px; }
.preview-raw-wrap { padding: 10px 14px 14px; }

.output-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 14px; }

.lyrics-pre { padding: 14px; font-family: monospace; font-size: 13px; white-space: pre-wrap; word-break: break-word; color: var(--text); background: var(--surface3); margin: 0 14px 14px; border-radius: var(--radius-sm); border: 1px solid var(--border); line-height: 1.7; }

/* ── TOOLTIPS ── */
[data-tip] { position: relative; }
[data-tip]:hover::after {
  content: attr(data-tip);
  position: absolute; bottom: calc(100% + 6px); left: 50%; transform: translateX(-50%);
  background: #1a1a2e; color: #e2e2f0; border: 1px solid #3a3a5a;
  font-size: 13px; line-height: 1.4; padding: 6px 10px; border-radius: 6px;
  white-space: pre-wrap; max-width: 240px; min-width: 140px; z-index: 500;
  pointer-events: none; box-shadow: 0 4px 16px rgba(0,0,0,.5);
}
.theme-light [data-tip]:hover::after { background: #1a1a2e; color: #e2e2f0; }

.preset-modal { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; width: min(480px, 96vw); max-height: 80vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,.6); }

.preset-list { display: flex; flex-direction: column; gap: 8px; }
.preset-item { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; display: flex; align-items: center; gap: 10px; }
.preset-item-info { flex: 1; min-width: 0; }
.preset-item-name { font-size: 13px; font-weight: 600; color: var(--text); }
.preset-item-meta { font-size: 13px; color: var(--text-dim); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.preset-empty { text-align: center; color: var(--text-muted); font-size: 13px; padding: 20px; }

/* ── META PRODUCTION / MOOD TAGS ── */
.meta-tag-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 6px; }
.meta-tag-btn { padding: 6px 10px; border-radius: 6px; border: 1px solid var(--border); background: var(--surface2); color: var(--text-dim); font-size: 13px; cursor: pointer; text-align: left; transition: all .15s; font-family: inherit; position: relative; }
.meta-tag-btn:hover { border-color: var(--text-dim); color: var(--text); }
.meta-tag-btn.active-prod { border-color: var(--l5); color: var(--l5); background: rgba(249,115,22,.12); }
.meta-tag-btn.active-mood { border-color: var(--l2); color: var(--l2); background: rgba(59,130,246,.12); }

/* ── ARTIST REFERENCE ── */
.artist-ref-category { margin-bottom: 12px; }

.artist-tip-box { background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: 8px 10px; margin-bottom: 10px; font-size: 13px; color: var(--text-dim); line-height: 1.5; }

/* ── MISC ── */
.divider { height: 1px; background: var(--border); margin: 6px 0; }

</head>
<body>

<header class="app-header">
  <div class="header-inner">
    <div class="header-logo">🎛️</div>
    <div class="header-text">
      <h1>Suno v5 Tag Generator</h1>
      <p>6-Layer Style Field · Smart Genre Cascade · Conflict Detection · Guided Lyrics</p>
    </div>
    <div class="theme-row">
      <span class="theme-row-label">Theme</span>
      <div id="theme-swatches" style="display:flex;gap:5px"></div>
    </div>
    <div class="header-actions">
      <button class="btn btn-ghost" onclick="openPresets()">🗂️ Presets</button>
      <button class="btn btn-ghost" onclick="importJSON()">📂</button>
      <div class="export-wrap">
        <button class="btn btn-ghost" onclick="toggleExportMenu(event)">💾 Export ▾</button>
        <div class="export-dd" id="export-dd">
          <button onclick="exportTXT();closeExportMenu()">📄 Text File (.txt)</button>
          <button onclick="exportDOC();closeExportMenu()">📝 Word Doc (.doc)</button>
          <div class="dd-divider"></div>
          <button onclick="exportJSON();closeExportMenu()">💾 JSON Data</button>
        </div>
      </div>
      <button class="btn btn-ghost btn-danger-ghost" onclick="resetAll()">↺</button>
    </div>
  </div>
</header>

<!-- PRESET MODAL -->
<div class="preset-modal-backdrop" id="preset-backdrop" onclick="if(event.target===this)closePresets()">
  <div class="preset-modal">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
      <h3 style="margin:0">🗂️ Presets</h3>
      <button class="btn btn-ghost" onclick="closePresets()" style="padding:4px 8px">✕</button>
    </div>
    <div class="preset-save-row">
      <input class="text-input" id="preset-name-input" placeholder="Name this preset..." style="flex:1">
      <button class="btn" style="background:var(--l1);border-color:var(--l1);color:#fff" onclick="savePreset()">Save</button>
    </div>
    <div id="preset-list"></div>
  </div>
</div>

<div class="main">
  <div id="builder-col"></div>
  <div id="preview-col"></div>
</div>

<script src="kb.js"></script>
<script src="app.js"></script>

</body>
</html>
