<style>
:root {
  --bg: #120d07;
  --surface: #1c1409;
  --surface2: #261b0d;
  --surface3: #302212;
  --border: #4a3218;
  --text: #f5e6d0;
  --text-dim: #b08060;
  --text-muted: #705040;
  --l1: #f59e0b;
  --l2: #fb923c;
  --l3: #22c55e;
  --l4: #10b981;
  --l5: #f97316;
  --l6: #eab308;
  --conflict: #ef4444;
  --warn: #f59e0b;
  --pink: #f472b6;
  --radius: 10px;
  --radius-sm: 6px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: system-ui, -apple-system, sans-serif; font-size: 16px; line-height: 1.6; min-height: 100vh; }

/* ── LAYOUT ── */
.app-header { background: linear-gradient(135deg, #1e120a 0%, #120d07 100%); border-bottom: 1px solid var(--border); padding: 10px 20px; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 16px rgba(0,0,0,.4); }
.header-inner { max-width: 1400px; margin: 0 auto; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.header-logo { font-size: 24px; flex-shrink: 0; }
.header-text { min-width: 0; }
.header-text h1 { font-size: 18px; font-weight: 800; background: linear-gradient(90deg, #f59e0b, #fb923c, #fbbf24); -webkit-background-clip: text; -webkit-text-fill-color: transparent; white-space: nowrap; letter-spacing: -0.02em; }
.header-text p { font-size: 13px; color: var(--text-dim); margin-top: 1px; display: none; }
@media (min-width: 700px) { .header-text p { display: block; } }
.header-actions { margin-left: auto; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
/* ── THEME SWATCHES ── */
.theme-row { display: flex; align-items: center; gap: 5px; }
.theme-row-label { font-size: 13px; color: var(--text-muted); margin-right: 4px; }
.swatch { width: 18px; height: 18px; border-radius: 50%; border: 2px solid transparent; cursor: pointer; transition: all .15s; flex-shrink: 0; padding: 0; outline: none; }
.swatch:hover { transform: scale(1.2); }
.swatch.active { border-color: var(--text); transform: scale(1.2); }
/* ── EXPORT DROPDOWN ── */
.export-wrap { position: relative; }
.export-dd { position: absolute; top: calc(100% + 6px); right: 0; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); box-shadow: 0 8px 24px rgba(0,0,0,.5); min-width: 160px; display: none; z-index: 200; overflow: hidden; }
.export-dd.open { display: block; }
.export-dd button { display: flex; align-items: center; gap: 8px; width: 100%; padding: 9px 14px; background: none; border: none; color: var(--text); font-size: 13px; cursor: pointer; text-align: left; font-family: inherit; transition: background .1s; }
.export-dd button:hover { background: var(--surface2); }
.export-dd .dd-divider { height: 1px; background: var(--border); margin: 2px 0; }

.main { max-width: 1400px; margin: 0 auto; padding: 16px 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; align-items: start; }
#preview-col { position: sticky; top: 60px; max-height: calc(100vh - 72px); overflow-y: auto; scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
#preview-col::-webkit-scrollbar { width: 4px; }
#preview-col::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
@media (max-width: 860px) { .main { grid-template-columns: 1fr; padding: 12px; gap: 12px; } #preview-col { position: static; max-height: none; overflow-y: visible; } }
@media (max-width: 480px) { .main { padding: 8px; gap: 8px; } .app-header { padding: 8px 12px; } }

/* ── CARDS ── */
.card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; margin-bottom: 14px; transition: border-color .2s, box-shadow .2s; }
.card:hover { border-color: color-mix(in srgb, var(--l1) 30%, var(--border)); box-shadow: 0 4px 20px rgba(0,0,0,.25); }
.card-inner { padding: 16px; }

/* ── LAYER HEADERS ── */
.layer-hdr { display: flex; align-items: center; gap: 10px; padding: 12px 16px; border-bottom: 1px solid var(--border); background: var(--surface2); cursor: pointer; user-select: none; transition: background .15s, box-shadow .15s; }
.layer-hdr:hover { background: var(--surface3); }
.layer-hdr.no-acc { cursor: default; }
.layer-hdr.no-acc:hover { background: var(--surface2); }
.layer-badge { width: 30px; height: 30px; border-radius: 6px; background: var(--layer-color, var(--l1)); display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; color: #fff; flex-shrink: 0; }
.layer-title { font-size: 14px; font-weight: 700; color: var(--text); }
.layer-hint { font-size: 13px; color: var(--text-dim); margin-left: auto; text-align: right; max-width: 200px; }
.layer-summary { margin-left: auto; margin-right: 6px; font-size: 13px; color: var(--text-dim); font-family: monospace; max-width: 220px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; background: var(--surface3); padding: 2px 8px; border-radius: 10px; border: 1px solid var(--border); }
.acc-chevron { flex-shrink: 0; color: var(--text-muted); font-size: 13px; transition: transform .2s; line-height: 1; }
.acc-chevron.open { transform: rotate(180deg); }
.acc-hidden { display: none; }
/* ── SONG STRUCTURE MAP ── */
.struct-map { display: flex; flex-wrap: wrap; align-items: center; gap: 4px; padding: 12px 14px; }
.struct-map-block { display: flex; flex-direction: column; align-items: center; gap: 2px; padding: 7px 10px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface2); min-width: 66px; cursor: pointer; transition: all .15s; }
.struct-map-block:hover { border-color: var(--l2); background: var(--surface3); }
.smb-tag { font-size: 13px; font-weight: 700; font-family: monospace; color: var(--l2); }
.smb-dtag { font-size: 13px; color: var(--pink); font-family: monospace; min-height: 13px; }
.smb-text { font-size: 13px; color: var(--text-muted); max-width: 80px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.struct-arrow { color: var(--text-muted); font-size: 13px; }
.struct-map-empty { padding: 24px 16px; text-align: center; color: var(--text-muted); font-size: 13px; }

/* ── BUTTONS ── */
.btn { display: inline-flex; align-items: center; gap: 6px; padding: 7px 14px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: var(--surface2); color: var(--text); font-size: 13px; cursor: pointer; transition: all .15s; font-family: inherit; }
.btn:hover { background: var(--surface3); border-color: var(--text-dim); }
.btn-primary { background: linear-gradient(135deg, var(--l1), var(--l2)); border: none; color: #fff; font-weight: 700; padding: 10px 22px; border-radius: 22px; box-shadow: 0 3px 12px rgba(59,130,246,.35); transition: all .2s; }
.btn-primary:hover { transform: translateY(-1px); box-shadow: 0 5px 18px rgba(59,130,246,.45); opacity:1; }
.btn-primary:disabled { opacity: .4; cursor: not-allowed; transform: none; box-shadow: none; }
.btn-copy { background: var(--surface3); font-size: 13px; padding: 4px 10px; }
.btn-copy.copied { background: var(--l4); border-color: var(--l4); color: #fff; }
.btn-ghost { background: transparent; border-color: transparent; color: var(--text-dim); }
.btn-ghost:hover { color: var(--text); background: var(--surface2); border-color: var(--border); }
.btn-danger-ghost { color: var(--conflict); }
.btn-danger-ghost:hover { background: rgba(239,68,68,.1); border-color: var(--conflict); }
.btn-icon { width: 22px; height: 22px; padding: 0; border-radius: 4px; border: none; background: transparent; color: var(--text-dim); cursor: pointer; display: inline-flex; align-items: center; justify-content: center; font-size: 13px; transition: all .15s; }
.btn-icon:hover { background: var(--surface3); color: var(--text); }
.btn-icon.del:hover { color: var(--conflict); background: rgba(239,68,68,.1); }
.btn-add { display: inline-flex; align-items: center; gap: 5px; padding: 5px 10px; border-radius: var(--radius-sm); border: 1px dashed var(--border); background: transparent; color: var(--text-dim); font-size: 13px; cursor: pointer; margin-top: 8px; transition: all .15s; }
.btn-add:hover { border-color: var(--text-dim); color: var(--text); }
.btn-tab { padding: 5px 12px; border-radius: 20px; border: 1px solid var(--border); background: transparent; color: var(--text-dim); font-size: 13px; cursor: pointer; transition: all .15s; }
.btn-tab.active { background: var(--l1); border-color: var(--l1); color: #fff; }

/* ── GENRE PICKER ── */
.genre-group-label { font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: .1em; color: var(--text-muted); margin-bottom: 8px; }
.genre-group { margin-bottom: 16px; }
.genre-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 8px; }
.genre-card { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 10px 8px; cursor: pointer; transition: all .15s; text-align: center; display: flex; flex-direction: column; align-items: center; gap: 5px; }
.genre-card:hover { border-color: var(--l1); background: var(--surface3); }
.genre-card.active { border-color: var(--l1); background: rgba(139,92,246,.12); box-shadow: 0 0 0 1px var(--l1); }
.genre-icon { font-size: 22px; }
.genre-name { font-size: 13px; font-weight: 600; color: var(--text); }
/* ── FAVORITES ── */
.genre-card-wrap { position: relative; display: flex; flex-direction: column; }
.fav-btn { position: absolute; top: 3px; right: 3px; z-index: 2; background: none; border: none; cursor: pointer; font-size: 14px; padding: 2px 3px; line-height: 1; opacity: .35; transition: opacity .15s, transform .15s; }
.fav-btn:hover { opacity: 1; transform: scale(1.25); }
.fav-btn.active { opacity: 1; color: var(--l6); }
.fav-group-label { font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: var(--l6); margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
.fav-empty { font-size: 13px; color: var(--text-muted); font-style: italic; padding: 6px 0 2px; }
/* ── VOCALIST BUILDER ── */
.vo-section-label { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: .07em; color: var(--text-muted); margin: 12px 0 5px; }
.vo-section-label .vo-hint { font-size: 11px; font-weight: 400; text-transform: none; letter-spacing: 0; color: var(--text-muted); opacity: .7; }
.vo-preview { margin: 10px 0 4px; font-size: 13px; color: var(--text-dim); background: var(--surface2); border-radius: var(--radius-sm); padding: 6px 10px; }
.vo-preview code { color: var(--pink); font-family: monospace; }
.vo-actions { display: flex; gap: 6px; margin-top: 10px; align-items: center; flex-wrap: wrap; }
.vo-active-banner { display: flex; align-items: center; justify-content: space-between; gap: 8px; background: rgba(236,72,153,.1); border: 1px solid rgba(236,72,153,.3); border-radius: var(--radius-sm); padding: 7px 10px; margin-bottom: 12px; font-size: 13px; color: var(--text-dim); flex-wrap: wrap; }
.vo-lib-header { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: .07em; color: var(--text-muted); margin-bottom: 8px; }
.vo-lib-list { display: flex; flex-direction: column; gap: 6px; }
.vo-lib-item { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 8px 10px; display: flex; flex-wrap: wrap; align-items: center; gap: 6px; }
.vo-lib-item.active { border-color: var(--pink); background: rgba(236,72,153,.08); }
.vo-lib-name { font-size: 13px; font-weight: 700; color: var(--text); min-width: 80px; }
.vo-lib-desc { font-size: 12px; color: var(--text-muted); flex: 1; min-width: 120px; font-family: monospace; }
.vo-lib-actions { display: flex; gap: 4px; margin-left: auto; flex-shrink: 0; }
.btn-xs { padding: 3px 8px; font-size: 11px; border-radius: 4px; }
.artist-ref-none { font-size: 13px; color: var(--text-muted); font-style: italic; padding: 4px 0; }
/* ── VOCALIST NESTED INSIDE LYRICS ── */
.lyr-vocalist-wrap .card { margin-bottom: 0; border-radius: 0; border-left: none; border-right: none; border-top: none; border-bottom: 2px solid var(--border); }
.lyr-vocalist-wrap .card .layer-hdr { border-radius: 0; background: var(--surface2); }
.lyr-vocalist-wrap .card .card-inner { padding: 12px 14px; }
/* ── DELIVERY GROUPS (lyrics section vocalist tags) ── */
.delivery-groups { padding: 6px 12px 8px; display: flex; flex-direction: column; gap: 5px; border-bottom: 1px solid var(--border); background: var(--surface2); }
.delivery-group { display: flex; align-items: flex-start; flex-wrap: wrap; gap: 4px; }
.delivery-group-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .07em; color: var(--text-muted); min-width: 68px; flex-shrink: 0; padding-top: 3px; }
.delivery-selected { display: flex; flex-wrap: wrap; gap: 3px; }
.delivery-badge { background: rgba(244,114,182,.15); border: 1px solid rgba(244,114,182,.4); color: var(--pink); border-radius: 3px; font-size: 10px; padding: 1px 5px; font-weight: 700; letter-spacing: .02em; }
/* ── FOLDABLE LYRICS SECTIONS ── */
.lsec-chevron { font-size: 11px; color: var(--text-muted); transition: transform .15s; display: inline-block; }
.lsec-chevron.open { transform: rotate(0deg); }
.lsec-chevron:not(.open) { transform: rotate(-90deg); }
.lsec-preview { font-size: 11px; color: var(--text-muted); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 180px; opacity: 0.65; font-style: italic; }
.lsec-collapsed .lyrics-sec-hdr { border-bottom: none; border-radius: 6px; }
.lsec-body { }
.genre-desc { font-size: 13px; color: var(--text-dim); line-height: 1.3; }
/* ── GENRE SELECTED STATE ── */
.genre-sel-row { display: flex; align-items: center; gap: 14px; padding: 14px 16px; }
.genre-sel-icon { font-size: 36px; line-height: 1; flex-shrink: 0; }
.genre-sel-info { flex: 1; min-width: 0; }
.genre-sel-name { font-size: 17px; font-weight: 700; color: var(--text); }
.genre-sel-meta { font-size: 13px; color: var(--text-dim); margin-top: 2px; }
.genre-sel-desc { font-size: 13px; color: var(--text-muted); margin-top: 3px; font-style: italic; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.check-badge { width: 24px; height: 24px; border-radius: 50%; background: var(--l4); display: flex; align-items: center; justify-content: center; font-size: 13px; color: #fff; flex-shrink: 0; margin-right: 4px; }
.subgenre-card-inner { padding: 14px 16px; }
.subgenre-label { font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: var(--text-dim); margin-bottom: 10px; }
.subgenre-selected-badge { display: inline-block; padding: 3px 10px; border-radius: 20px; background: rgba(139,92,246,.2); border: 1px solid var(--l1); color: var(--l1); font-size: 13px; font-weight: 600; margin-bottom: 10px; }

/* ── CHIPS ── */
.chip-group { display: flex; flex-wrap: wrap; gap: 6px; }
.chip { padding: 5px 11px; border-radius: 20px; border: 1px solid var(--border); background: var(--surface2); color: var(--text-dim); font-size: 13px; cursor: pointer; transition: all .15s; font-family: inherit; }
.chip:hover { border-color: var(--text-dim); color: var(--text); }
.chip.active { background: color-mix(in srgb, var(--l1) 18%, transparent); border-color: var(--l1); color: var(--l1); font-weight: 600; }
.chip.active-l2 { background: color-mix(in srgb, var(--l2) 18%, transparent); border-color: var(--l2); color: var(--l2); }
.chip.active-l3 { background: color-mix(in srgb, var(--l3) 18%, transparent); border-color: var(--l3); color: var(--l3); }
.chip.active-l4 { background: color-mix(in srgb, var(--l4) 18%, transparent); border-color: var(--l4); color: var(--l4); }
.chip.active-l5 { background: color-mix(in srgb, var(--l5) 18%, transparent); border-color: var(--l5); color: var(--l5); }
.chip.active-l6 { background: color-mix(in srgb, var(--l6) 18%, transparent); border-color: var(--l6); color: var(--l6); }
.chip.conflict { border-color: var(--conflict); color: var(--conflict); opacity: .7; }
.chip.warn { border-color: var(--warn); color: var(--warn); }
.chip.chip-sm { font-size: 13px; padding: 3px 9px; }
.chip.chip-xs { font-size: 13px; padding: 2px 7px; }
.chip.chip-exclude { color: var(--conflict); border-color: rgba(239,68,68,.3); }
.chip.chip-exclude:hover { background: rgba(239,68,68,.1); }
.chip.chip-exclude.active { background: rgba(239,68,68,.2); border-color: var(--conflict); }
.chip.chip-struct { color: var(--l2); border-color: rgba(59,130,246,.3); }
.chip.chip-struct:hover { background: rgba(59,130,246,.1); }
.chip.chip-delivery { color: var(--pink); border-color: rgba(236,72,153,.3); }
.chip.chip-delivery:hover { background: rgba(236,72,153,.1); }
.chip.chip-delivery.active { background: rgba(236,72,153,.2); border-color: var(--pink); color: var(--pink); }

/* ── MOOD SECTION ── */
.mood-group { margin-bottom: 12px; }
.mood-primary-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
.mood-primary-btn { padding: 6px 14px; border-radius: 20px; border: 2px solid var(--border); background: var(--surface2); color: var(--text); font-size: 13px; font-weight: 600; cursor: pointer; transition: all .15s; }
.mood-primary-btn:hover { border-color: var(--l2); }
.mood-primary-btn.active { background: rgba(59,130,246,.2); border-color: var(--l2); color: var(--l2); }
.mood-primary-btn.warn { border-color: var(--warn); }
.mood-modifiers { display: flex; flex-wrap: wrap; gap: 5px; padding-left: 12px; }

/* ── TEMPO ── */
.tempo-range-bar { display: flex; justify-content: space-between; font-size: 13px; color: var(--text-dim); margin-bottom: 6px; }
.tempo-range-bar .range-label-warn { color: var(--conflict); font-weight: 700; }
.tempo-slider { width: 100%; accent-color: var(--l3); height: 6px; border-radius: 3px; cursor: pointer; transition: accent-color .2s; }
.tempo-slider.bpm-warn { accent-color: var(--conflict); }
.tempo-bpm-display { text-align: center; margin-top: 8px; display: flex; align-items: baseline; justify-content: center; gap: 4px; }
.tempo-bpm-num { font-size: 36px; font-weight: 700; color: var(--l3); transition: color .2s; }
.tempo-bpm-num.bpm-warn { color: var(--conflict); }
.tempo-bpm-unit { font-size: 13px; color: var(--text-dim); }
.bpm-warn-msg { display: none; text-align: center; font-size: 13px; color: var(--conflict); margin-top: 4px; padding: 4px 10px; background: rgba(239,68,68,.1); border-radius: 4px; border: 1px solid rgba(239,68,68,.3); }
.bpm-warn-msg.visible { display: block; }
.tempo-presets { display: flex; align-items: center; gap: 6px; margin-top: 10px; flex-wrap: wrap; }
.tempo-preset-label { font-size: 13px; color: var(--text-dim); }

/* ── INSTRUMENTS ── */
.inst-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
.inst-item { display: flex; align-items: center; gap: 8px; padding: 7px 10px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: var(--surface2); cursor: pointer; transition: all .15s; }
.inst-item:hover { border-color: var(--l4); }
.inst-item.selected { border-color: var(--l4); background: rgba(34,197,94,.1); }
.inst-item input[type=checkbox] { accent-color: var(--l4); width: 14px; height: 14px; flex-shrink: 0; }
.inst-order { width: 18px; height: 18px; border-radius: 50%; background: var(--surface3); display: flex; align-items: center; justify-content: center; font-size: 11px; color: var(--text-dim); flex-shrink: 0; }
.inst-item.selected .inst-order { background: var(--l4); color: #fff; }
.inst-name { font-size: 13px; color: var(--text); flex: 1; }

/* ── QUALITY/VOCAL TAG ITEMS ── */
.tag-item { display: flex; align-items: flex-start; gap: 10px; padding: 10px 12px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: var(--surface2); cursor: pointer; transition: all .15s; margin-bottom: 6px; }
.tag-item:hover { border-color: var(--l6); }
.tag-item.selected-quality { border-color: var(--l6); background: rgba(234,179,8,.1); }
.tag-item.selected-vocal { border-color: var(--pink); background: rgba(236,72,153,.1); }
.tag-item.conflict-item { border-color: rgba(239,68,68,.4); opacity: .6; }
.tag-item input[type=checkbox] { margin-top: 2px; flex-shrink: 0; accent-color: var(--l6); width: 14px; height: 14px; }
.tag-item.selected-vocal input[type=checkbox] { accent-color: var(--pink); }
.tag-label { font-size: 13px; font-weight: 700; font-family: monospace; color: var(--text); }
.tag-desc { font-size: 13px; color: var(--text-dim); margin-top: 2px; line-height: 1.4; }
.conflict-badge { display: inline-block; padding: 1px 6px; border-radius: 10px; background: rgba(239,68,68,.2); border: 1px solid var(--conflict); color: var(--conflict); font-size: 13px; margin-top: 3px; }

/* ── CONFLICT BANNER ── */
.conflict-banner { margin: 0 16px 12px; padding: 8px 12px; border-radius: var(--radius-sm); background: rgba(239,68,68,.1); border: 1px solid rgba(239,68,68,.4); color: var(--conflict); font-size: 13px; }

/* ── INPUTS ── */
.text-input { width: 100%; padding: 7px 10px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: var(--surface3); color: var(--text); font-size: 13px; font-family: inherit; transition: border-color .15s; outline: none; }
.text-input:focus { border-color: var(--l1); }
.textarea { width: 100%; padding: 8px 10px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: var(--surface3); color: var(--text); font-size: 13px; font-family: inherit; resize: vertical; outline: none; transition: border-color .15s; }
.textarea:focus { border-color: var(--l1); }
.custom-row { display: flex; align-items: center; gap: 6px; margin-top: 6px; }
.custom-prefix { font-size: 13px; color: var(--conflict); font-family: monospace; white-space: nowrap; }
.selected-summary { margin-top: 10px; padding: 8px 10px; border-radius: var(--radius-sm); background: var(--surface3); font-size: 13px; color: var(--text-dim); }
.selected-tag { display: inline-block; padding: 1px 7px; border-radius: 10px; background: var(--surface); border: 1px solid var(--border); color: var(--text); margin: 2px; font-size: 13px; }

/* ── SECTION HEADER ── */
.sec-hdr { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; border-bottom: 1px solid var(--border); }
.sec-hdr h3 { font-size: 13px; font-weight: 700; }
.sec-hint { font-size: 13px; color: var(--text-dim); }

/* ── PREVIEW SIDE ── */
.preview-empty { padding: 48px 20px; text-align: center; color: var(--text-dim); }
.preview-empty-icon { font-size: 48px; margin-bottom: 12px; }
.preview-empty p { font-size: 13px; }
.preview-hdr { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px; border-bottom: 1px solid var(--border); background: var(--surface2); }
.preview-hdr h3 { font-size: 13px; font-weight: 700; color: var(--text-dim); text-transform: uppercase; letter-spacing: .06em; }
.annotated-wrap { padding: 14px; display: flex; flex-wrap: wrap; gap: 6px; align-items: flex-start; }
.ann-part { display: flex; flex-direction: column; padding: 4px 8px; border-radius: var(--radius-sm); border: 1px solid var(--part-color, var(--border)); background: color-mix(in srgb, var(--part-color, var(--border)) 12%, transparent); max-width: 100%; }
.ann-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: var(--part-color, var(--text-dim)); }
.ann-content { font-size: 13px; color: var(--text); word-break: break-word; }
.ann-comma { color: var(--text-muted); padding: 4px 0; align-self: center; font-size: 13px; }
.preview-raw-wrap { padding: 10px 14px 14px; }
.raw-textarea { width: 100%; padding: 8px 10px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: var(--surface3); color: var(--text); font-size: 13px; font-family: monospace; resize: none; outline: none; cursor: text; }
.raw-textarea:focus { border-color: var(--l1); }

/* ── LYRICS BUILDER ── */
.lyrics-info { margin: 0 16px 12px; padding: 8px 12px; border-radius: var(--radius-sm); background: rgba(234,179,8,.08); border: 1px solid rgba(234,179,8,.25); color: var(--warn); font-size: 13px; }
.add-section-bar { padding: 12px 16px; border-bottom: 1px solid var(--border); display: flex; flex-wrap: wrap; gap: 5px; }
.lyrics-sections-list { padding: 12px 16px; display: flex; flex-direction: column; gap: 10px; }
.lyrics-empty { padding: 32px 20px; text-align: center; color: var(--text-muted); font-size: 13px; }
.lyrics-sec { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); transition: box-shadow .15s; }
.lyrics-sec.dragging { opacity: .5; }
.lyrics-sec.drag-over { border-color: var(--l2); box-shadow: 0 0 0 2px rgba(59,130,246,.3); }
.lyrics-sec-hdr { display: flex; align-items: center; gap: 6px; padding: 8px 10px; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
.drag-handle { color: var(--text-muted); cursor: grab; font-size: 14px; flex-shrink: 0; }
.drag-handle:active { cursor: grabbing; }
.struct-badge { padding: 3px 8px; border-radius: 4px; background: rgba(59,130,246,.2); border: 1px solid rgba(59,130,246,.4); color: var(--l2); font-size: 13px; font-weight: 700; font-family: monospace; flex-shrink: 0; }
.delivery-chips { display: flex; flex-wrap: wrap; gap: 4px; flex: 1; }
.lyrics-sec-controls { display: flex; gap: 3px; margin-left: auto; }
.lyrics-textarea { width: 100%; padding: 10px 12px; background: transparent; border: none; color: var(--text); font-size: 13px; font-family: inherit; resize: vertical; outline: none; min-height: 72px; }
.lyrics-textarea::placeholder { color: var(--text-muted); }
.freeform-wrap { padding: 12px 16px; }

/* ── MORE OPTIONS (Suno panel mirror) ── */
.more-opts-grid { display: grid; gap: 14px; padding: 14px 16px; }
.more-opt-row { display: flex; align-items: center; gap: 12px; }
.more-opt-label { font-size: 13px; font-weight: 600; color: var(--text); min-width: 110px; flex-shrink: 0; }
.gender-toggle { display: flex; gap: 6px; }
.gender-btn { padding: 5px 14px; border-radius: 20px; border: 1px solid var(--border); background: transparent; color: var(--text-dim); font-size: 13px; cursor: pointer; transition: all .15s; font-family: inherit; }
.gender-btn.active-male { background: rgba(59,130,246,.2); border-color: var(--l2); color: var(--l2); font-weight: 600; }
.gender-btn.active-female { background: rgba(236,72,153,.2); border-color: var(--pink); color: var(--pink); font-weight: 600; }
.opts-slider-wrap { flex: 1; display: flex; align-items: center; gap: 10px; }
.opts-slider { flex: 1; accent-color: var(--pink); cursor: pointer; }
.opts-pct { font-size: 13px; font-weight: 700; color: var(--text); min-width: 38px; text-align: right; }
/* ── EXCLUDED STYLES BOX ── */
.excl-box { margin: 12px 16px 0; border: 1px dashed var(--border); border-radius: var(--radius-sm); padding: 10px 12px; min-height: 44px; display: flex; flex-wrap: wrap; align-items: center; gap: 6px; background: var(--surface3); }
.excl-box-empty { font-size: 13px; color: var(--text-muted); font-style: italic; }
.excl-chip { display: inline-flex; align-items: center; gap: 4px; padding: 3px 10px; border-radius: 12px; background: rgba(239,68,68,.12); border: 1px solid rgba(239,68,68,.35); color: var(--conflict); font-size: 12px; font-family: monospace; }
/* ── MORE OPTIONS OUTPUT CARD ── */
.more-opts-out { margin-top: 12px; }
.more-opts-out-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 12px 14px; }
.mo-field { background: var(--surface3); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 10px 12px; }
.mo-field-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .07em; color: var(--text-muted); margin-bottom: 4px; }
.mo-field-val { font-size: 13px; color: var(--text); font-weight: 600; }
.mo-field-val.empty { color: var(--text-muted); font-style: italic; font-weight: 400; }
.mo-excl-chips { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; }
/* ── OUTPUT SECTION ── */
.output-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 14px; }
.output-field-label { font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: var(--text-dim); margin-bottom: 6px; }
.output-textarea { width: 100%; padding: 8px 10px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: var(--surface3); color: var(--text); font-size: 13px; font-family: monospace; resize: none; outline: none; margin-bottom: 8px; cursor: text; }
.output-textarea:focus { border-color: var(--l1); }

/* ── LYRICS PREVIEW ── */
.lyrics-pre { padding: 14px; font-family: monospace; font-size: 13px; white-space: pre-wrap; word-break: break-word; color: var(--text); background: var(--surface3); margin: 0 14px 14px; border-radius: var(--radius-sm); border: 1px solid var(--border); line-height: 1.7; }
.lyrics-pre .stag { color: var(--l2); font-weight: 700; }
.lyrics-pre .dtag { color: var(--pink); font-weight: 700; }

/* ── TOOLTIPS ── */
[data-tip] { position: relative; }
[data-tip]:hover::after {
  content: attr(data-tip);
  position: absolute; bottom: calc(100% + 6px); left: 50%; transform: translateX(-50%);
  background: #1a1a2e; color: #e2e2f0; border: 1px solid #3a3a5a;
  font-size: 13px; line-height: 1.4; padding: 6px 10px; border-radius: 6px;
  white-space: pre-wrap; max-width: 240px; min-width: 140px; z-index: 500;
  pointer-events: none; box-shadow: 0 4px 16px rgba(0,0,0,.5);
}
.theme-light [data-tip]:hover::after { background: #1a1a2e; color: #e2e2f0; }

/* ── PRESETS ── */
.preset-modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,.6); z-index: 400; display: none; align-items: center; justify-content: center; }
.preset-modal-backdrop.open { display: flex; }
.preset-modal { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; width: min(480px, 96vw); max-height: 80vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,.6); }
.preset-modal h3 { font-size: 15px; font-weight: 700; color: var(--text); margin-bottom: 14px; }
.preset-save-row { display: flex; gap: 8px; margin-bottom: 16px; }
.preset-save-row input { flex: 1; }
.preset-list { display: flex; flex-direction: column; gap: 8px; }
.preset-item { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; display: flex; align-items: center; gap: 10px; }
.preset-item-info { flex: 1; min-width: 0; }
.preset-item-name { font-size: 13px; font-weight: 600; color: var(--text); }
.preset-item-meta { font-size: 13px; color: var(--text-dim); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.preset-empty { text-align: center; color: var(--text-muted); font-size: 13px; padding: 20px; }

/* ── META PRODUCTION / MOOD TAGS ── */
.meta-tag-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 6px; }
.meta-tag-btn { padding: 6px 10px; border-radius: 6px; border: 1px solid var(--border); background: var(--surface2); color: var(--text-dim); font-size: 13px; cursor: pointer; text-align: left; transition: all .15s; font-family: inherit; position: relative; }
.meta-tag-btn:hover { border-color: var(--text-dim); color: var(--text); }
.meta-tag-btn.active-prod { border-color: var(--l5); color: var(--l5); background: rgba(249,115,22,.12); }
.meta-tag-btn.active-mood { border-color: var(--l2); color: var(--l2); background: rgba(59,130,246,.12); }
.meta-tag-name { font-weight: 600; font-size: 13px; }

/* ── ARTIST REFERENCE ── */
.artist-ref-category { margin-bottom: 12px; }
.artist-ref-cat-label { font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: var(--text-muted); margin-bottom: 6px; }
.artist-ref-sub { margin-bottom: 8px; }
.artist-ref-sub-label { font-size: 13px; font-weight: 600; color: var(--text-dim); margin-bottom: 4px; }
.artist-chips { display: flex; flex-wrap: wrap; gap: 4px; }
.artist-chip { font-size: 13px; padding: 3px 8px; border-radius: 4px; border: 1px solid var(--border); background: var(--surface2); color: var(--text-dim); cursor: pointer; transition: all .12s; font-family: inherit; white-space: nowrap; }
.artist-chip:hover { border-color: var(--l1); color: var(--l1); background: rgba(139,92,246,.1); }
.artist-ref-input-row { display: flex; gap: 6px; margin-bottom: 10px; }
.artist-ref-preview { font-size: 13px; color: var(--l1); background: rgba(139,92,246,.1); border: 1px solid rgba(139,92,246,.3); border-radius: 4px; padding: 4px 8px; margin-top: 6px; font-style: italic; }
.artist-tip-box { background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: 8px 10px; margin-bottom: 10px; font-size: 13px; color: var(--text-dim); line-height: 1.5; }
.artist-tip-box strong { color: var(--l1); }

/* ── MISC ── */
.divider { height: 1px; background: var(--border); margin: 6px 0; }
.tab-row { display: flex; gap: 6px; }
.warn-dot { color: var(--warn); }
.conflict-dot { color: var(--conflict); }
/* L3 header warning banner */
.layer-hdr-warn { display: inline-flex; align-items: center; gap: 4px; background: rgba(239,68,68,.15); border: 1px solid rgba(239,68,68,.4); border-radius: 4px; padding: 2px 8px; font-size: 11px; font-weight: 700; color: var(--conflict); flex-shrink: 0; }

/* ── VOCALIST ── */
.vocal-build-wrap { padding: 12px 14px; display: flex; flex-direction: column; gap: 10px; }
.vocal-section-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .07em; color: var(--text-muted); margin-bottom: 4px; }
.vocal-type-row { display: flex; flex-wrap: wrap; gap: 5px; }
.pitch-presets { display: flex; flex-wrap: wrap; gap: 5px; }
.pitch-preset-btn { padding: 5px 10px; border-radius: 5px; border: 1px solid var(--border); background: var(--surface2); color: var(--text-dim); font-size: 12px; cursor: pointer; font-family: monospace; transition: all .15s; text-align:left; }
.pitch-preset-btn:hover { border-color: var(--l2); color: var(--l2); }
.pitch-preset-btn.active { border-color: var(--l2); background: rgba(59,130,246,.15); color: var(--l2); }
.pitch-preset-hint { font-size: 11px; color: var(--text-muted); margin-top: 3px; font-style: italic; }
.vocal-cmd-block { background: var(--surface3); border: 1px solid var(--border); border-radius: 5px; padding: 8px 10px; font-family: monospace; font-size: 12px; color: var(--l2); word-break: break-all; min-height: 28px; }
.vocal-lib-list { display: flex; flex-direction: column; gap: 6px; max-height: 180px; overflow-y: auto; }
.vocal-lib-item { display: flex; align-items: center; gap: 8px; padding: 7px 10px; border-radius: 6px; border: 1px solid var(--border); background: var(--surface2); cursor: pointer; transition: all .15s; }
.vocal-lib-item:hover { border-color: var(--l1); }
.vocal-lib-item.active { border-color: var(--l1); background: rgba(139,92,246,.1); }
.vocal-lib-name { font-size: 13px; font-weight: 600; color: var(--text); flex: 1; }
.vocal-lib-tags { font-size: 11px; color: var(--text-muted); font-family: monospace; }
.vocal-lib-actions { display: flex; gap: 4px; }

/* ── WIZARD ── */
.wizard-wrap {
  display: flex; flex-direction: column; gap: 0;
  --sc: #3b82f6;
}

/* ── Track (step pills) ── */
.wiz-track {
  position: sticky; top: 0; z-index: 20;
  background: color-mix(in srgb, var(--surface) 92%, var(--l1) 8%);
  border-bottom: 1px solid var(--border);
  padding: 14px 16px 10px;
  overflow-x: auto; scrollbar-width: none;
}
.wiz-track::-webkit-scrollbar { display: none; }
.wiz-rail {
  display: flex; align-items: center;
  min-width: max-content; gap: 0;
}
.wiz-line {
  flex: 1; height: 2px; min-width: 18px;
  background: var(--border); margin-bottom: 20px;
  transition: background .35s;
}
.wiz-line.lit { background: color-mix(in srgb, var(--sc) 60%, transparent); }

.wiz-pill {
  display: flex; flex-direction: column; align-items: center; gap: 5px;
  border: none; background: none; cursor: pointer; padding: 0 8px;
  font-family: inherit; transition: opacity .2s;
}
.wiz-pill:disabled { opacity: .38; cursor: default; }
.wiz-pill-ring {
  width: 34px; height: 34px; border-radius: 50%;
  border: 2px solid var(--border);
  background: var(--surface2);
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; transition: all .25s;
}
.wiz-pill.active .wiz-pill-ring {
  background: var(--sc);
  border-color: var(--sc);
  box-shadow: 0 0 0 5px color-mix(in srgb, var(--sc) 18%, transparent);
  transform: scale(1.12);
}
.wiz-pill.done .wiz-pill-ring {
  background: color-mix(in srgb, var(--sc) 14%, var(--surface));
  border-color: var(--sc);
  font-size: 13px; color: var(--sc);
}
.wiz-pill-lbl {
  font-size: 9px; font-weight: 700; text-transform: uppercase;
  letter-spacing: .07em; color: var(--text-dim);
  white-space: nowrap; transition: color .2s;
}
.wiz-pill.active .wiz-pill-lbl { color: var(--sc); }
.wiz-pill.done   .wiz-pill-lbl { color: var(--sc); opacity: .7; }

/* ── Step header ── */
.wiz-hdr {
  display: flex; align-items: flex-start; gap: 14px;
  padding: 20px 20px 16px;
  background: linear-gradient(140deg,
    color-mix(in srgb, var(--sc) 9%, var(--surface)) 0%,
    var(--surface) 65%);
  border-bottom: 1px solid var(--border);
}
.wiz-hdr-icon {
  width: 50px; height: 50px; border-radius: 14px; flex-shrink: 0;
  background: linear-gradient(135deg, var(--sc), color-mix(in srgb, var(--sc) 55%, #000));
  display: flex; align-items: center; justify-content: center;
  font-size: 22px;
  box-shadow: 0 4px 14px color-mix(in srgb, var(--sc) 38%, transparent);
}
.wiz-hdr-text { flex: 1; min-width: 0; }
.wiz-hdr-num {
  font-size: 10px; font-weight: 800; text-transform: uppercase;
  letter-spacing: .1em;
  color: var(--sc);
  margin-bottom: 3px;
}
.wiz-hdr-title {
  font-size: 22px; font-weight: 800; color: var(--text);
  margin: 0 0 4px; line-height: 1.15; letter-spacing: -0.02em;
}
.wiz-hdr-hint {
  font-size: 12px; color: var(--text-dim); margin: 0; line-height: 1.5;
}

/* ── Step body ── */
.wiz-body { flex: 1; }
.wiz-body .card {
  border-radius: 0 !important;
  border-left: none !important; border-right: none !important;
  border-top: none !important;
}

/* ── Footer nav ── */
.wiz-footer {
  position: sticky; bottom: 0; z-index: 10;
  background: color-mix(in srgb, var(--surface) 92%, var(--l1) 8%);
  border-top: 1px solid var(--border);
  padding: 12px 20px;
  display: flex; align-items: center; justify-content: space-between; gap: 12px;
}
.wiz-step-dots {
  display: flex; gap: 6px; align-items: center;
}
.wiz-sdot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--border); transition: all .2s;
}
.wiz-sdot.a {
  background: var(--sc);
  width: 18px; border-radius: 3px;
  box-shadow: 0 0 6px color-mix(in srgb, var(--sc) 50%, transparent);
}
.wiz-sdot.d { background: color-mix(in srgb, var(--sc) 45%, transparent); }

.wiz-btn {
  border: none; border-radius: 24px;
  font-family: inherit; font-size: 13px; font-weight: 700;
  padding: 9px 20px; cursor: pointer; transition: all .2s;
  white-space: nowrap;
}
.wiz-btn-back {
  background: var(--surface2); color: var(--text-dim);
  border: 1px solid var(--border);
}
.wiz-btn-back:hover { color: var(--text); border-color: var(--text-dim); }
.wiz-btn-restart {
  background: transparent; color: var(--text-muted);
  border: 1px solid transparent;
  padding: 9px 12px; font-size: 16px;
}
.wiz-btn-restart:hover { color: #ef4444; border-color: #ef4444; background: rgba(239,68,68,.08); }
.wiz-btn-save {
  background: transparent; color: var(--text-muted);
  border: 1px solid transparent;
  padding: 9px 12px; font-size: 16px;
}
.wiz-btn-save:hover { color: #22c55e; border-color: #22c55e; background: rgba(34,197,94,.08); }
.wiz-btn-next {
  background: linear-gradient(135deg, var(--sc), color-mix(in srgb, var(--sc) 65%, #000));
  color: #fff;
  box-shadow: 0 3px 12px color-mix(in srgb, var(--sc) 40%, transparent);
}
.wiz-btn-next:hover:not(:disabled) {
  transform: translateY(-1px);
  box-shadow: 0 5px 18px color-mix(in srgb, var(--sc) 55%, transparent);
}
.wiz-btn-next:disabled {
  opacity: .38; cursor: not-allowed;
  transform: none; box-shadow: none;
}





/* ── POCKETBASE / SONG SYNC ── */
.btn-cloud {
  font-weight: 700; font-size: 12px;
  background: color-mix(in srgb, var(--l1) 10%, transparent);
  border-color: color-mix(in srgb, var(--l1) 35%, transparent);
  color: var(--l1);
  white-space: nowrap;
}
.btn-cloud:hover { background: color-mix(in srgb, var(--l1) 20%, transparent); border-color: var(--l1); }

/* Modal base */
.pb-modal {
  position: fixed; inset: 0; z-index: 3000;
  background: rgba(0,0,0,.65); backdrop-filter: blur(5px);
  display: flex; align-items: center; justify-content: center;
  padding: 16px; opacity: 1; transition: opacity .2s;
}
.pb-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 16px; width: min(460px,100%);
  max-height: 88vh; display: flex; flex-direction: column;
  box-shadow: 0 24px 64px rgba(0,0,0,.7), 0 0 0 1px rgba(245,158,11,.05);
}
.pb-card-wide { width: min(680px,100%); }
.pb-hdr {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 18px; border-bottom: 1px solid var(--border);
  font-weight: 800; font-size: 15px; flex-shrink: 0;
  background: var(--surface2);
}
.pb-close {
  background: transparent; border: none; cursor: pointer;
  color: var(--text-muted); font-size: 16px; padding: 2px 6px;
  border-radius: 6px; font-family: inherit; transition: all .15s;
}
.pb-close:hover { background: var(--surface2); color: var(--text); }
.pb-toolbar {
  display: flex; gap: 8px; padding: 10px 16px;
  border-bottom: 1px solid var(--border); flex-shrink: 0; flex-wrap: wrap;
}
.pb-body {
  overflow-y: auto; padding: 14px 16px;
  flex: 1; display: flex; flex-direction: column; gap: 8px;
  scrollbar-width: thin;
}
.pb-foot {
  display: flex; justify-content: flex-end; gap: 8px;
  padding: 12px 18px; border-top: 1px solid var(--border); flex-shrink: 0;
}
.pb-label {
  display: flex; flex-direction: column; gap: 5px;
  font-size: 12px; font-weight: 700; color: var(--text-muted);
}
.pb-input {
  padding: 8px 12px; border-radius: 8px;
  border: 1px solid var(--border); background: var(--surface2);
  color: var(--text); font-size: 14px; font-family: inherit;
  transition: border-color .15s; outline: none;
}
.pb-input:focus { border-color: var(--l1); }
.pb-err {
  padding: 8px 12px; background: rgba(239,68,68,.1);
  border: 1px solid rgba(239,68,68,.3); border-radius: 8px;
  color: #ef4444; font-size: 13px;
}
.pb-loading, .pb-empty {
  padding: 24px; text-align: center;
  color: var(--text-muted); font-size: 13px; font-style: italic;
}
.pb-user-badge {
  font-size: 11px; color: var(--text-muted);
  background: var(--surface2); padding: 2px 8px;
  border-radius: 10px; border: 1px solid var(--border);
}

/* Song rows */
.song-row {
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 10px; padding: 12px 14px;
  display: flex; align-items: flex-start; gap: 12px;
  flex-wrap: wrap;
}
.song-row.active { border-color: var(--l1); background: color-mix(in srgb, var(--l1) 6%, var(--surface)); }
.song-row-info { flex: 1; min-width: 0; }
.song-row-title {
  font-size: 14px; font-weight: 700; color: var(--text); margin-bottom: 3px;
}
.song-active-badge {
  font-size: 10px; font-weight: 800; text-transform: uppercase;
  background: var(--l1); color: #fff;
  padding: 1px 6px; border-radius: 8px; margin-left: 6px;
}
.song-row-meta { font-size: 12px; color: var(--text-dim); margin-bottom: 2px; }
.song-row-time { font-size: 11px; color: var(--text-muted); }
.song-row-actions {
  display: flex; gap: 5px; flex-wrap: wrap; flex-shrink: 0;
}
.btn-sm { padding: 5px 10px; font-size: 12px; }

/* Toast */
.pb-toast {
  position: fixed; bottom: 80px; right: 20px; z-index: 9999;
  background: #22c55e; color: #fff; font-size: 13px; font-weight: 700;
  padding: 9px 18px; border-radius: 10px;
  box-shadow: 0 4px 14px rgba(0,0,0,.35);
  opacity: 1; transition: opacity .3s;
}
.pb-toast-err { background: #ef4444; }

/* ── VALIDATE MODAL ── */
.val-modal {
  position: fixed; inset: 0; z-index: 2000;
  background: rgba(0,0,0,.65);
  backdrop-filter: blur(5px);
  display: flex; align-items: center; justify-content: center;
  padding: 16px;
  opacity: 1; transition: opacity .2s;
}
.val-modal-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  width: min(620px, 100%);
  max-height: 88vh;
  display: flex; flex-direction: column;
  box-shadow: 0 24px 64px rgba(0,0,0,.6);
}
.val-modal-hdr {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 20px;
  border-bottom: 1px solid var(--border);
  font-weight: 800; font-size: 15px;
  flex-shrink: 0;
}
.val-modal-close {
  background: transparent; border: none; cursor: pointer;
  color: var(--text-muted); font-size: 16px; padding: 2px 6px;
  border-radius: 6px; transition: all .15s; font-family: inherit;
}
.val-modal-close:hover { background: var(--surface2); color: var(--text); }
.val-modal-body {
  overflow-y: auto; padding: 16px 20px;
  flex: 1; scrollbar-width: thin;
}
.val-modal-foot {
  display: flex; justify-content: flex-end; gap: 10px;
  padding: 12px 20px;
  border-top: 1px solid var(--border);
  flex-shrink: 0;
}

/* validate footer button */
.wiz-btn-validate {
  font-size: 13px; font-weight: 700; padding: 6px 12px;
  background: rgba(34,197,94,.1);
  border: 1px solid rgba(34,197,94,.3);
  white-space: nowrap;
}
.wiz-btn-validate:hover {
  background: rgba(34,197,94,.2);
  border-color: #22c55e;
}

/* ── SONGS DB FILE UI ── */
.songs-db-banner {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 16px; border-bottom: 1px solid var(--border);
  font-size: 13px; flex-shrink: 0;
}
.songs-db-connected {
  background: color-mix(in srgb, var(--l3) 8%, var(--surface));
  color: var(--text-dim);
}
.songs-db-unpicked {
  background: color-mix(in srgb, var(--l1) 8%, var(--surface));
  border-bottom: 1px solid color-mix(in srgb, var(--l1) 30%, transparent);
}
.songs-db-icon { font-size: 18px; flex-shrink: 0; }
.songs-db-name { font-family: monospace; font-size: 12px; color: var(--text-dim); }
.songs-db-msg { display: flex; flex-direction: column; flex: 1; }
.songs-db-msg strong { color: var(--text); font-size: 13px; }
.songs-db-msg span { color: var(--text-muted); font-size: 12px; }
.songs-db-pick-btn {
  margin-left: auto; flex-shrink: 0;
  font-size: 12px; font-weight: 700;
  background: color-mix(in srgb, var(--l1) 15%, transparent);
  border: 1px solid color-mix(in srgb, var(--l1) 50%, transparent);
  color: var(--l1); border-radius: 8px; padding: 5px 12px;
  cursor: pointer; font-family: inherit; white-space: nowrap;
  transition: background .15s, border-color .15s;
}
.songs-db-pick-btn:hover {
  background: color-mix(in srgb, var(--l1) 25%, transparent);
  border-color: var(--l1);
}

/* ── WIZARD SUB-STEPS ── */
.wiz-sstabs {
  display: flex; align-items: center; gap: 4px;
  flex-wrap: wrap; margin-top: 10px;
}
.wiz-sstab {
  background: transparent;
  border: 1.5px solid var(--border);
  border-radius: 20px; padding: 4px 11px;
  font-size: 11px; font-weight: 700; color: var(--text-muted);
  cursor: pointer; transition: all .15s; white-space: nowrap;
}
.wiz-sstab.active {
  background: var(--sc); border-color: var(--sc); color: #fff;
}
.wiz-sstab.done {
  background: rgba(34,197,94,.12); border-color: #22c55e; color: #22c55e;
}
.wiz-sstab:hover:not(.active) {
  border-color: var(--sc); color: var(--text);
}
.wiz-sstab-sep { color: var(--text-muted); font-size: 10px; padding: 0 1px; }
.wiz-pill-subpip {
  font-size: 9px; font-weight: 800; color: var(--sc);
  background: color-mix(in srgb, var(--sc) 15%, transparent);
  border-radius: 8px; padding: 1px 5px; margin-top: 2px; line-height: 1.4;
}
.wiz-step-dots .wiz-sdot { cursor: pointer; }

/* ── WIZARD VALIDATE STEP ── */
.wiz-btn-generate {
  background: linear-gradient(135deg, #f59e0b, #ea7e0b);
  border-color: #c9820a; color: #1a0e00;
  font-size: 13px; font-weight: 800; letter-spacing: .02em;
  box-shadow: 0 3px 14px rgba(245,158,11,.35);
}
.wiz-btn-generate:hover { background: linear-gradient(135deg, #fbbf24, #f59e0b); box-shadow: 0 5px 20px rgba(245,158,11,.5); }

.vstep-wrap { padding: 0 2px; }
.vstep-badge-row {
  background: rgba(34,197,94,.1); border: 1px solid rgba(34,197,94,.3);
  border-radius: 12px; padding: 12px 16px; margin-bottom: 16px;
}
.vstep-opt-badge {
  display: inline-block; font-size: 12px; font-weight: 800;
  color: #22c55e; letter-spacing: .04em; text-transform: uppercase; margin-bottom: 6px;
}
.vstep-opt-hint {
  font-size: 12px; color: var(--text-muted); margin: 0; line-height: 1.5;
}
.vstep-body { margin-top: 4px; }

/* ── VALIDATION STEP ── */
.val-score-row {
  display: flex; align-items: center; gap: 20px;
  padding: 18px 20px; background: var(--surface2);
  border: 1px solid var(--border); border-radius: 14px;
  margin-bottom: 14px;
}
.val-score-ring {
  position: relative; flex-shrink: 0;
  width: 72px; height: 72px;
}
.val-ring-svg {
  width: 72px; height: 72px;
  transform: rotate(-90deg);
}
.val-ring-bg   { fill: none; stroke: var(--border); stroke-width: 5; }
.val-ring-fill { fill: none; stroke-width: 5; stroke-linecap: round;
                 transition: stroke-dasharray .5s ease; }
.val-score-num {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; font-weight: 900; font-variant-numeric: tabular-nums;
}
.val-score-info { flex: 1; min-width: 0; }
.val-score-label { font-size: 11px; text-transform: uppercase;
                   letter-spacing:.08em; color: var(--text-muted); margin-bottom: 4px; }
.val-score-tag {
  display: inline-block; color: #fff; font-size: 11px; font-weight: 800;
  padding: 2px 10px; border-radius: 20px; margin-bottom: 8px;
}
.val-summary { display: flex; gap: 6px; flex-wrap: wrap; }
.val-badge {
  font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 12px;
}
.val-badge.err { background: rgba(239,68,68,.15);  color: #ef4444; }
.val-badge.wrn { background: rgba(245,158,11,.15); color: #f59e0b; }
.val-badge.tip { background: rgba(99,102,241,.15); color: #6366f1; }
.val-ok  { font-size: 12px; color: #22c55e; font-weight: 600; }

/* Issue groups */
.val-issues { display: flex; flex-direction: column; gap: 10px; margin-bottom: 16px; }
.val-clear {
  padding: 14px 18px; text-align: center;
  background: rgba(34,197,94,.08); border: 1px solid rgba(34,197,94,.2);
  border-radius: 10px; color: #22c55e; font-size: 14px; font-weight: 600;
}
.val-group { border-radius: 10px; overflow: hidden;
             border: 1px solid var(--border); }
.val-group-hdr {
  padding: 7px 14px; font-size: 12px; font-weight: 800;
  text-transform: uppercase; letter-spacing: .05em;
}
.val-group-hdr.err { background: rgba(239,68,68,.12); color: #ef4444; }
.val-group-hdr.wrn { background: rgba(245,158,11,.12); color: #f59e0b; }
.val-group-hdr.tip { background: rgba(99,102,241,.12); color: #6366f1; }
.val-issue {
  padding: 9px 14px;
  border-top: 1px solid var(--border);
  background: var(--surface);
}
.val-issue-msg { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 3px; }
.val-issue-tip { font-size: 12px; color: var(--text-dim); }

/* Exclude box */
.val-exclude-box {
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 12px; padding: 12px 16px; margin-bottom: 14px;
}
.val-exclude-hdr {
  font-size: 12px; font-weight: 800; text-transform: uppercase;
  letter-spacing: .06em; color: var(--text-muted); margin-bottom: 8px;
}
.val-exclude-chips { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 8px; min-height: 24px; }
.val-empty { font-size: 12px; color: var(--text-muted); font-style: italic; }
.val-exclude-add { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 8px; }
.val-excl-custom {
  display: flex; gap: 6px; align-items: center; margin-top: 5px;
}
.btn-del {
  background: transparent; border: 1px solid var(--border);
  color: var(--text-muted); border-radius: 6px; padding: 3px 7px;
  cursor: pointer; font-size: 11px; transition: all .15s;
}
.btn-del:hover { background: rgba(239,68,68,.1); color: #ef4444; border-color: #ef4444; }

/* Generate CTA */
.val-generate { text-align: center; padding: 4px 0 8px; }
.val-gen-btn {
  font-size: 15px; padding: 12px 32px; border-radius: 28px;
  box-shadow: 0 4px 18px rgba(139,92,246,.4);
}

/* ── INTRO OVERLAY ── */
.intro-overlay {
  position: fixed; inset: 0; z-index: 2000;
  background: rgba(0,0,0,.75);
  backdrop-filter: blur(6px);
  display: flex; align-items: center; justify-content: center;
  padding: 16px;
  opacity: 1; transition: opacity .28s, transform .28s;
}
.intro-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 18px;
  width: min(740px, 100%);
  max-height: 90vh;
  overflow-y: auto;
  box-shadow: 0 32px 80px rgba(0,0,0,.7);
  display: flex; flex-direction: column;
  scrollbar-width: thin;
}
.intro-hero {
  padding: 14px 24px 10px;
  text-align: center;
  background: linear-gradient(160deg,
    color-mix(in srgb, var(--l1) 12%, var(--surface)) 0%,
    var(--surface) 70%);
  border-bottom: 1px solid var(--border);
}
.intro-logo { font-size: 30px; margin-bottom: 4px; }
.intro-title {
  font-size: 22px; font-weight: 800;
  background: linear-gradient(90deg, var(--l1), var(--l2), var(--l3));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  margin-bottom: 6px;
}
.intro-tagline { font-size: 13px; color: var(--text-dim); }

.intro-body-text {
  padding: 10px 22px;
  font-size: 13px; line-height: 1.65; color: var(--text-dim);
  border-bottom: 1px solid var(--border);
}

/* Steps row */
.intro-steps-wrap {
  padding: 10px 12px 16px;
  overflow-x: auto; overflow-y: visible;
  min-height: 165px;
  border-bottom: 1px solid var(--border);
}
.intro-steps-wrap::-webkit-scrollbar { display: none; }
.intro-steps {
  display: flex; align-items: flex-start;
  gap: 4px; min-width: max-content; padding: 0 8px;
}
.intro-step {
  display: flex; flex-direction: column; align-items: center;
  gap: 3px; width: 96px; text-align: center;
}
.intro-step-icon {
  width: 36px; height: 36px; border-radius: 10px;
  background: linear-gradient(135deg, var(--l1), var(--l2));
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
  box-shadow: 0 3px 8px rgba(139,92,246,.3);
}
.intro-step-num {
  font-size: 11px; font-weight: 800; color: var(--l2);
  letter-spacing: .05em;
}
.intro-step-label { font-size: 13px; font-weight: 700; color: var(--text); }
.intro-step-desc  { font-size: 12px; color: var(--text-muted); line-height: 1.4; }
.intro-step-ex    { font-size: 11px; color: var(--l2); opacity: .85; line-height: 1.3; margin-top: 3px; font-style: italic; }
.intro-step-arrow {
  color: var(--border); font-size: 18px;
  padding: 0 2px; margin-top: 14px; flex-shrink: 0;
}

/* Result */
.intro-result {
  padding: 10px 20px;
  border-bottom: 1px solid var(--border);
}
.intro-result-title {
  font-size: 11px; font-weight: 800; text-transform: uppercase;
  letter-spacing: .08em; color: var(--text-muted); margin-bottom: 6px;
}
.intro-result-items { display: flex; flex-direction: column; gap: 6px; }
.intro-result-item {
  display: flex; align-items: center; gap: 10px;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 8px; padding: 7px 12px;
}
.intro-result-icon { font-size: 17px; flex-shrink: 0; }
.intro-result-label { font-size: 13px; font-weight: 700; color: var(--text); }
.intro-result-desc  { font-size: 12px; color: var(--text-dim); margin-top: 1px; }

/* Actions */
.intro-actions {
  position: sticky; bottom: 0;
  background: var(--surface);
  border-top: 1px solid var(--border);
  padding: 12px 22px;
  display: flex; align-items: center; justify-content: flex-end; gap: 12px;
  z-index: 1;
}
.intro-skip {
  background: transparent; border: none;
  color: var(--text-muted); font-size: 13px; cursor: pointer;
  font-family: inherit; padding: 8px 4px;
  transition: color .15s;
}
.intro-skip:hover { color: var(--text-dim); }
.intro-start {
  background: linear-gradient(135deg, var(--l1), var(--l2));
  border: none; color: #fff; font-weight: 700;
  font-size: 15px; padding: 12px 28px; border-radius: 24px;
  cursor: pointer; font-family: inherit;
  box-shadow: 0 4px 14px rgba(139,92,246,.4);
  transition: all .2s;
}
.intro-start:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(139,92,246,.55);
}


/* ── GENRE FILTER TABS ── */
.gft-tabs-row {
  display: flex; gap: 6px; overflow-x: auto;
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
  scrollbar-width: none;
  -webkit-overflow-scrolling: touch;
}
.gft-tabs-row::-webkit-scrollbar { display: none; }
.gft-tab {
  display: flex; align-items: center; gap: 5px;
  flex-shrink: 0;
  padding: 6px 12px; border-radius: 20px;
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--text-dim); font-size: 12px; font-weight: 700;
  cursor: pointer; font-family: inherit;
  white-space: nowrap;
  transition: all .15s;
}
.gft-tab:hover { border-color: var(--l1); color: var(--text); }
.gft-tab.active {
  background: var(--l1); border-color: var(--l1);
  color: #fff;
}
.gft-count {
  font-size: 10px; font-weight: 800; opacity: .7;
  background: rgba(255,255,255,.2);
  padding: 1px 5px; border-radius: 8px;
}
.gft-tab.active .gft-count { background: rgba(255,255,255,.25); }

/* ── COMPACT GENRE PICKER ── */
.gpc-body { padding: 12px 14px; }
.gpc-section { margin-bottom: 10px; }
.gpc-section-label {
  font-size: 10px; font-weight: 800; text-transform: uppercase;
  letter-spacing: .08em; color: var(--text-muted);
  margin-bottom: 6px; padding-left: 2px;
}
.gpc-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
}
@media (max-width: 480px) {
  .gpc-grid { grid-template-columns: repeat(2, 1fr); }
}
.gpc-wrap { position: relative; }
.gpc-card {
  width: 100%; display: flex; flex-direction: column;
  align-items: center; gap: 5px;
  padding: 12px 6px 10px;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 12px; cursor: pointer;
  font-family: inherit; transition: all .15s;
}
.gpc-card:hover {
  background: color-mix(in srgb, var(--l1) 10%, var(--surface));
  border-color: var(--l1);
  transform: translateY(-2px);
  box-shadow: 0 4px 12px rgba(139,92,246,.2);
}
.gpc-icon { font-size: 26px; line-height: 1; }
.gpc-name {
  font-size: 11px; font-weight: 700; color: var(--text);
  text-align: center; line-height: 1.3;
  word-break: break-word;
}
.gpc-fav {
  position: absolute; top: 5px; right: 6px;
  background: transparent; border: none;
  font-size: 14px; cursor: pointer;
  color: var(--text-muted); padding: 0; line-height: 1;
  transition: color .15s;
}
.gpc-fav:hover, .gpc-fav.active { color: #f59e0b; }
.gpc-empty {
  padding: 24px; text-align: center;
  color: var(--text-muted); font-size: 13px; font-style: italic;
}

/* ── APP FOOTER ── */
.app-footer {
  text-align: center; padding: 14px 20px;
  border-top: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center; gap: 8px;
  flex-wrap: wrap;
}
.app-footer-name {
  font-size: 13px; font-weight: 800; letter-spacing: .02em;
  background: linear-gradient(90deg, var(--l1), var(--l2));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.app-footer-engine {
  font-size: 11px; font-weight: 700; color: var(--text-dim);
  text-transform: uppercase; letter-spacing: .08em;
}
.app-footer-version {
  font-family: monospace; font-weight: 700;
  color: var(--text-dim);
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 4px; padding: 1px 6px; font-size: 11px;
}
.app-footer-sep { color: var(--border); font-size: 10px; }

/* ── LANG TOGGLE ── */
.lang-toggle { display: flex; gap: 3px; align-items: center; }
.lang-btn { padding: 4px 10px; border-radius: 14px; border: 1px solid var(--border); background: transparent; color: var(--text-dim); font-size: 12px; font-weight: 600; cursor: pointer; transition: all .15s; font-family: inherit; letter-spacing: .03em; }
.lang-btn.active { background: linear-gradient(135deg, var(--l1), var(--l2)); border-color: var(--l1); color: #fff; box-shadow: 0 2px 8px rgba(59,130,246,.3); }
.lang-btn:hover:not(.active) { border-color: var(--text-dim); color: var(--text); }
</style>
</head>
<body>

<div class="app-header">
  <div class="header-inner">
    <div class="header-logo">🎵</div>
    <div class="header-text">
      <h1>Rick AI</h1>
      <p id="app-subtitle">RickAI Engine — Générateur de prompts précis pour Suno v5</p>
    </div>
    <div class="header-actions">
      <div class="lang-toggle">
        <button class="lang-btn" id="lang-en" onclick="setLang('en')" title="English — click to set as default">EN</button>
        <button class="lang-btn" id="lang-fr" onclick="setLang('fr')" title="Français — cliquer pour définir par défaut">FR</button>
      </div>
      <div class="theme-row">
        <div id="theme-swatches" style="display:flex;gap:4px"></div>
      </div>
      <button class="btn btn-cloud" id="cloud-btn" onclick="showSongLibrary()">💾 Songs</button>
      <button class="btn" onclick="openPresets()">⭐ Presets</button>
      <button class="btn btn-ghost" onclick="showIntro()" title="Guide / Aide" style="font-size:15px;padding:6px 10px;">?</button>
      <button class="btn" onclick="importJSON()">⬆ Import</button>
      <div class="export-wrap">
        <button class="btn" onclick="toggleExportMenu(event)">⬇ Export ▾</button>
        <div class="export-dd" id="export-dd">
          <button onclick="exportJSON();closeExportMenu()">📄 Export JSON</button>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="main">
  <div id="builder-col"></div>
  <div id="preview-col"></div>
</div>

<!-- Presets Modal -->
<div class="preset-modal-backdrop" id="preset-backdrop" onclick="if(event.target===this)closePresets()">
  <div class="preset-modal">
    <h3>⭐ Saved Presets</h3>
    <div class="preset-save-row">
      <input class="text-input" id="preset-name-input" type="text" placeholder="Preset name…">
      <button class="btn" onclick="savePreset()">Save Current</button>
    </div>
    <div class="preset-list" id="preset-list"></div>
    <div style="text-align:right;margin-top:14px">
      <button class="btn" onclick="closePresets()">Close</button>
    </div>
  </div>
</div>

<footer class="app-footer">
  <span class="app-footer-name">Rick AI</span>
  <span class="app-footer-sep">·</span>
  <span class="app-footer-engine">RickAI Engine</span>
  <span class="app-footer-sep">·</span>
  <span class="app-footer-version" id="app-version-lbl"></span>
</footer>

<script src="kb.js"></script>
<script src="lang.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.2/sql-wasm.js"></script>
  <script src="app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () =>
        navigator.serviceWorker.register('./sw.js')
          .catch(e => console.warn('SW:', e))
      );
    }
  </script>
</body>
</html>
